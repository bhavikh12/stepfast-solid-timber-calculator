<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stepfast Solid Timber Calculator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #f0f4f8; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { background: #1e3a5f; color: white; padding: 20px; border-radius: 8px 8px 0 0; }
        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .header p { font-size: 14px; opacity: 0.9; }
        .main { background: white; border-radius: 0 0 8px 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
        .form-section { padding: 30px; border-right: 1px solid #e5e7eb; }
        .quote-section { padding: 30px; background: #f9fafb; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #374151; font-size: 14px; }
        select, input { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; }
        select:focus, input:focus { outline: none; border-color: #1e3a5f; }
        .radio-group { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        .radio-group label { display: flex; align-items: center; font-weight: 500; margin-bottom: 0; cursor: pointer; padding: 12px; border: 2px solid #e5e7eb; border-radius: 6px; transition: all 0.2s; }
        .radio-group label:hover { border-color: #1e3a5f; background: #f9fafb; }
        .radio-group input:checked + span { font-weight: 700; }
        .radio-group label.selected { border-color: #1e3a5f; background: #eff6ff; }
        .radio-group input { margin-right: 10px; width: auto; }
        .checkbox-group { display: flex; align-items: center; margin-bottom: 15px; }
        .checkbox-group input { width: auto; margin-right: 8px; }
        .nested { margin-left: 30px; margin-top: 10px; }
        .info-text { font-size: 12px; color: #1e3a5f; margin-top: 5px; }
        .btn { width: 100%; padding: 12px; background: #1e3a5f; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn:hover { background: #2c4f7c; }
        .quote-card { background: white; border: 1px solid #e5e7eb; border-radius: 8px; padding: 20px; }
        .quote-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f3f4f6; }
        .quote-row:last-child { border-bottom: none; }
        .quote-label { color: #6b7280; font-size: 14px; }
        .quote-value { font-weight: 600; color: #111827; font-size: 14px; }
        .section-title { font-weight: 700; font-size: 16px; margin: 20px 0 15px 0; color: #111827; }
        .total-row { padding: 15px 0; font-size: 18px; font-weight: 700; color: #1e3a5f; border-top: 2px solid #1e3a5f; margin-top: 10px; }
        .notice { background: #eff6ff; border-left: 3px solid #1e3a5f; padding: 10px; font-size: 12px; color: #1e40af; margin: 10px 0; }
        .placeholder { text-align: center; color: #9ca3af; padding: 40px 20px; }
        .button-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-secondary { background: #10b981; }
        .btn-secondary:hover { background: #059669; }
        .hidden { display: none; }
        .divider { border-top: 2px solid #e5e7eb; margin: 25px 0; padding-top: 25px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Stepfast Solid Timber Quote Calculator</h1>
            <p>Professional solid timber flooring quotes • All prices exclude GST</p>
        </div>
        <div class="main">
            <div class="grid">
                <div class="form-section">
                    <div class="form-group">
                        <label>Job Type</label>
                        <div class="radio-group">
                            <label id="jobTypeLabel1">
                                <input type="radio" name="jobType" value="sand_seal_only" checked>
                                <span>Sand & Seal Only (existing floor)</span>
                            </label>
                            <label id="jobTypeLabel2">
                                <input type="radio" name="jobType" value="replace_install">
                                <span>Replace & Install (new timber)</span>
                            </label>
                        </div>
                    </div>
                    
                    <!-- SAND & SEAL ONLY SECTION -->
                    <div id="sandSealOnlySection">
                        <div class="form-group">
                            <label>Area (m²)</label>
                            <input type="number" id="sandSealArea" placeholder="Enter area" step="0.1" min="0">
                            <div class="info-text hidden" id="sandSealWastageInfo"></div>
                        </div>
                    </div>
                    
                    <!-- REPLACE & INSTALL SECTION -->
                    <div id="replaceInstallSection" class="hidden">
                        <div class="form-group">
                            <label>Timber Type</label>
                            <select id="timber"><option value="">Select Timber</option></select>
                        </div>
                        
                        <div class="form-group hidden" id="sizeGroup">
                            <label>Size</label>
                            <select id="size"><option value="">Select Size</option></select>
                        </div>
                        
                        <div class="form-group hidden" id="gradeGroup">
                            <label>Grade</label>
                            <select id="grade"><option value="">Select Grade</option></select>
                        </div>
                        
                        <div class="form-group">
                            <label>Area (m²)</label>
                            <input type="number" id="area" placeholder="Enter area" step="0.1" min="0">
                            <div class="info-text hidden" id="wastageInfo"></div>
                        </div>
                        
                        <div class="form-group">
                            <label>Installation Method</label>
                            <div class="radio-group">
                                <label id="installLabel1">
                                    <input type="radio" name="installType" value="sand_seal" checked>
                                    <span>Sand & Seal</span>
                                </label>
                                <label id="installLabel2">
                                    <input type="radio" name="installType" value="plank_ply">
                                    <span>Plank on Ply</span>
                                </label>
                                <label id="installLabel3">
                                    <input type="radio" name="installType" value="install_only">
                                    <span>Install Only</span>
                                </label>
                            </div>
                        </div>
                        
                        <div class="divider"></div>
                        
                        <div class="checkbox-group">
                            <input type="checkbox" id="removal">
                            <label for="removal" style="margin-bottom: 0; font-weight: 600;">Floor Removal Required</label>
                        </div>
                        
                        <div class="nested hidden" id="removalOptions">
                            <div class="form-group">
                                <label>Removal Area (m²)</label>
                                <input type="number" id="removalArea" placeholder="Enter removal area" step="0.1" min="0">
                                <div class="info-text">Can be different from installation area</div>
                            </div>
                        </div>
                        
                        <div class="checkbox-group">
                            <input type="checkbox" id="beading">
                            <label for="beading" style="margin-bottom: 0; font-weight: 600;">Beading Required</label>
                        </div>
                        
                        <div class="nested hidden" id="beadingOptions">
                            <div class="form-group">
                                <label>Beading Length (m)</label>
                                <input type="number" id="beadingLength" placeholder="Enter length" step="0.1" min="0">
                            </div>
                        </div>
                        
                        <div class="checkbox-group">
                            <input type="checkbox" id="skirting">
                            <label for="skirting" style="margin-bottom: 0; font-weight: 600;">Skirting Required</label>
                        </div>
                        
                        <div class="nested hidden" id="skirtingOptions">
                            <div class="form-group">
                                <label>Skirting Length (m)</label>
                                <input type="number" id="skirtingLength" placeholder="Enter length" step="0.1" min="0">
                            </div>
                            <div class="checkbox-group">
                                <input type="checkbox" id="largeSkirting">
                                <label for="largeSkirting" style="margin-bottom: 0;">Large Skirting (110-140mm)</label>
                            </div>
                        </div>
                    </div>
                    
                    <button class="btn" onclick="calculateQuote()">Calculate Quote</button>
                </div>
                
                <div class="quote-section">
                    <div id="quotePlaceholder" class="placeholder">
                        <p>Complete the form and click "Calculate Quote"</p>
                    </div>
                    
                    <div id="quoteResult" class="hidden">
                        <h2 style="margin-bottom: 20px;">Quote Summary</h2>
                        <div class="quote-card">
                            <div id="quoteDetails"></div>
                        </div>
                        <div class="button-group">
                            <button class="btn" onclick="alert('Quote saved!')">Save Quote</button>
                            <button class="btn btn-secondary" onclick="downloadQuote()">Download</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CSV_DATA = `Blackbutt,80 x 12,S&B,164.94
Blackbutt,80 x 12,Feature,154.29
Blackbutt,86 x 12,Prestige,194.29
Blackbutt,86 x 12,Rustic,144.29
Blackbutt,80 x 13,S&B,165.71
Blackbutt,80 x 13,Feature,154.29
Blackbutt,83 x 14,Select,214.29
Blackbutt,83 x 14,Contemporary,175.71
Blackbutt,83 x 14,Rustic,147.14
Blackbutt,85 x 14,Select E/M,214.29
Blackbutt,85 x 14,Rustic E/M,148.57
Blackbutt,130 x 14,Select,264.29
Blackbutt,130 x 14,Contemporary,205.71
Blackbutt,130 x 14,Rustic,168.57
Blackbutt,180 x 14,Prestige,275.71
Blackbutt,180 x 14,Rustic,187.53
Blackbutt,80 x 19,Select,255.71
Blackbutt,80 x 19,Contemporary,208.57
Blackbutt,80 x 19,Rustic,167.14
Blackbutt,130 x 19,Select,298.57
Blackbutt,130 x 19,Contemporary,227.14
Blackbutt,130 x 19,Rustic,180.00
Jarrah,85 x 13,S&B,151.43
Jarrah,85 x 13,Feature,74.29
Jarrah,130 x 13,S&B,167.14
Jarrah,130 x 13,Feature,80.00
Jarrah,80 x 19,S&B,210.00
Jarrah,80 x 19,Feature,132.86
Jarrah,130 x 19,S&B,252.86
Jarrah,130 x 19,Feature,174.29
Grey Iron Bark,86 x 12,Select,190.00
Grey Iron Bark,86 x 12,Rustic,144.29
Grey Iron Bark,83 x 14,Select,192.86
Grey Iron Bark,83 x 14,Standard,172.86
Grey Iron Bark,83 x 14,Rustic,147.14
Grey Iron Bark,130 x 14,Select,228.57
Grey Iron Bark,130 x 14,Rustic,164.29
Grey Iron Bark,80 x 19,Select,231.43
Grey Iron Bark,80 x 19,Standard,202.86
Grey Iron Bark,80 x 19,Rustic,167.14
Spotted Gum,86 x 12,Select,190.00
Spotted Gum,86 x 12,Rustic,144.29
Spotted Gum,83 x 14,Select,192.86
Spotted Gum,83 x 14,Standard,175.97
Spotted Gum,83 x 14,Rustic,147.14
Spotted Gum,85 x 14,Select,192.86
Spotted Gum,130 x 14,Select,228.57
Spotted Gum,130 x 14,Standard,205.71
Spotted Gum,130 x 14,Rustic,168.57
Spotted Gum,180 x 14,Select,225.71
Spotted Gum,180 x 14,Rustic,187.14
Spotted Gum,80 x 19,Select,231.43
Spotted Gum,80 x 19,Standard,207.14
Spotted Gum,80 x 19,Rustic,167.14
Spotted Gum,130 x 19,Select,260.00
Spotted Gum,130 x 19,Standard,228.57
Tasmanian Oak,65 x 12,Prime,118.57
Tasmanian Oak,85 x 12,Prime,152.86
Tasmanian Oak,108 x 12,Prime,165.71
Tasmanian Oak,133 x 12,Prime,182.86
Brushbox,86 x 12,Select,177.14
Brushbox,83 x 14,Select,180.00
Brushbox,130 x 14,Select,215.71
Brushbox,180 x 14,Select,218.57
Brushbox,80 x 19,Select,215.71
Brushbox,130 x 19,Select,241.43
Sydney Blue Gum,86 x 12,Select,168.57
Sydney Blue Gum,86 x 12,Rustic,124.29
Sydney Blue Gum,83 x 14,Select,171.43
Sydney Blue Gum,83 x 14,Standard,147.14
Sydney Blue Gum,83 x 14,Rustic,127.14
Sydney Blue Gum,130 x 14,Select,202.86
Sydney Blue Gum,130 x 14,Standard,165.71
Sydney Blue Gum,130 x 14,Rustic,134.29`;

        const RATES = {
            SAND_SEAL_0_25_LABOUR: 1650,
            SAND_SEAL_0_25_MATERIALS: 850,
            SAND_SEAL_25_45_LABOUR: 1900,
            SAND_SEAL_25_45_MATERIALS: 1500,
            SAND_SEAL_45_LABOUR: 52,
            SAND_SEAL_45_MATERIALS: 33,
            PLANK_PLY_LABOUR: 52,
            PLANK_PLY_MATERIALS: 33,
            PLANK_PLY_UNDER5_LABOUR: 300,
            PLANK_PLY_UNDER5_MATERIALS: 165,
            REMOVAL_LABOUR: 80,
            REMOVAL_MATERIALS: 15,
            REMOVAL_UNDER5_LABOUR: 1000,
            REMOVAL_UNDER5_MATERIALS: 150,
            INSTALL_LABOUR: 45,
            INSTALL_MATERIALS: 35,
            INSTALL_UNDER20_LABOUR: 1100,
            INSTALL_UNDER20_MATERIALS: 850,
            BEADING_MATERIAL: 13,
            BEADING_LABOUR: 14,
            SKIRTING_STD_MATERIAL: 5,
            SKIRTING_STD_LABOUR: 14,
            SKIRTING_STD_DELIVERY: 50,
            SKIRTING_LARGE_MATERIAL: 7,
            SKIRTING_LARGE_LABOUR: 20,
            SKIRTING_LARGE_DELIVERY: 70,
            WASTAGE: 1.05
        };

        let PRODUCTS = {};
        let currentQuote = null;

        function parseCSV() {
            PRODUCTS = {};
            const lines = CSV_DATA.trim().split('\n');
            
            lines.forEach(line => {
                const [timber, size, grade, price] = line.split(',');
                
                if (!PRODUCTS[timber]) {
                    PRODUCTS[timber] = {};
                }
                
                if (!PRODUCTS[timber][size]) {
                    PRODUCTS[timber][size] = {};
                }
                
                PRODUCTS[timber][size][grade] = parseFloat(price);
            });
        }

        parseCSV();

        // Job Type Toggle
        document.querySelectorAll('input[name="jobType"]').forEach(radio => {
            radio.addEventListener('change', function() {
                document.querySelectorAll('.radio-group label').forEach(l => l.classList.remove('selected'));
                if (this.value === 'sand_seal_only') {
                    document.getElementById('jobTypeLabel1').classList.add('selected');
                    show('sandSealOnlySection');
                    hide('replaceInstallSection');
                } else {
                    document.getElementById('jobTypeLabel2').classList.add('selected');
                    hide('sandSealOnlySection');
                    show('replaceInstallSection');
                }
            });
        });

        // Install Type Radio Styling
        document.querySelectorAll('input[name="installType"]').forEach(radio => {
            radio.addEventListener('change', function() {
                document.querySelectorAll('#replaceInstallSection .radio-group label').forEach(l => l.classList.remove('selected'));
                if (this.value === 'sand_seal') {
                    document.getElementById('installLabel1').classList.add('selected');
                } else if (this.value === 'plank_ply') {
                    document.getElementById('installLabel2').classList.add('selected');
                } else {
                    document.getElementById('installLabel3').classList.add('selected');
                }
            });
        });

        document.getElementById('timber').addEventListener('change', function() {
            const timber = this.value;
            if (timber) {
                show('sizeGroup');
                populateSizes(timber);
            } else {
                hide('sizeGroup');
                hide('gradeGroup');
            }
        });

        document.getElementById('size').addEventListener('change', function() {
            const timber = document.getElementById('timber').value;
            const size = this.value;
            if (size) {
                show('gradeGroup');
                populateGrades(timber, size);
            } else {
                hide('gradeGroup');
            }
        });

        document.getElementById('sandSealArea').addEventListener('input', function() {
            const val = parseFloat(this.value);
            if (val > 0) {
                document.getElementById('sandSealWastageInfo').textContent = `Including 5% wastage: ${(val * 1.05).toFixed(2)} m²`;
                show('sandSealWastageInfo');
            } else {
                hide('sandSealWastageInfo');
            }
        });

        document.getElementById('area').addEventListener('input', function() {
            const val = parseFloat(this.value);
            if (val > 0) {
                document.getElementById('wastageInfo').textContent = `Including 5% wastage: ${(val * 1.05).toFixed(2)} m²`;
                show('wastageInfo');
            } else {
                hide('wastageInfo');
            }
        });

        document.getElementById('removal').addEventListener('change', function() {
            this.checked ? show('removalOptions') : hide('removalOptions');
        });

        document.getElementById('beading').addEventListener('change', function() {
            this.checked ? show('beadingOptions') : hide('beadingOptions');
        });

        document.getElementById('skirting').addEventListener('change', function() {
            this.checked ? show('skirtingOptions') : hide('skirtingOptions');
        });

        function show(id) { document.getElementById(id).classList.remove('hidden'); }
        function hide(id) { document.getElementById(id).classList.add('hidden'); }

        function populateTimbers() {
            const select = document.getElementById('timber');
            select.innerHTML = '<option value="">Select Timber</option>';
            
            Object.keys(PRODUCTS).sort().forEach(timber => {
                select.innerHTML += `<option value="${timber}">${timber}</option>`;
            });
        }

        function populateSizes(timber) {
            const select = document.getElementById('size');
            select.innerHTML = '<option value="">Select Size</option>';
            
            Object.keys(PRODUCTS[timber]).forEach(size => {
                select.innerHTML += `<option value="${size}">${size}</option>`;
            });
            
            document.getElementById('grade').innerHTML = '<option value="">Select Grade</option>';
        }

        function populateGrades(timber, size) {
            const select = document.getElementById('grade');
            select.innerHTML = '<option value="">Select Grade</option>';
            
            Object.keys(PRODUCTS[timber][size]).forEach(grade => {
                select.innerHTML += `<option value="${grade}">${grade}</option>`;
            });
        }

        function calculateQuote() {
            const jobType = document.querySelector('input[name="jobType"]:checked').value;
            
            if (jobType === 'sand_seal_only') {
                calculateSandSealOnly();
            } else {
                calculateReplaceInstall();
            }
        }

        function calculateSandSealOnly() {
            const area = parseFloat(document.getElementById('sandSealArea').value);
            
            if (!area) {
                alert('Please enter the area');
                return;
            }
            
            let installLabour = 0;
            let installMaterials = 0;
            
            if (area <= 25) {
                installLabour = RATES.SAND_SEAL_0_25_LABOUR;
                installMaterials = RATES.SAND_SEAL_0_25_MATERIALS;
            } else if (area <= 45) {
                installLabour = RATES.SAND_SEAL_25_45_LABOUR;
                installMaterials = RATES.SAND_SEAL_25_45_MATERIALS;
            } else {
                const areaWithWastage = area * RATES.WASTAGE;
                installLabour = areaWithWastage * RATES.SAND_SEAL_45_LABOUR;
                installMaterials = areaWithWastage * RATES.SAND_SEAL_45_MATERIALS;
            }
            
            const subtotal = installLabour + installMaterials;
            const gst = subtotal * 0.1;
            const total = subtotal + gst;
            
            currentQuote = {
                jobType: 'sand_seal_only',
                area,
                installLabour,
                installMaterials,
                subtotal,
                gst,
                total
            };
            
            displayQuote();
        }

        function calculateReplaceInstall() {
            const timber = document.getElementById('timber').value;
            const size = document.getElementById('size').value;
            const grade = document.getElementById('grade').value;
            const area = parseFloat(document.getElementById('area').value);
            const installType = document.querySelector('input[name="installType"]:checked').value;
            
            if (!timber || !size || !grade || !area) {
                alert('Please complete all required fields');
                return;
            }
            
            const materialCost = PRODUCTS[timber][size][grade];
            const areaWithWastage = area * RATES.WASTAGE;
            
            let flooringCost = areaWithWastage * materialCost;
            
            let installLabour = 0;
            let installMaterials = 0;
            
            if (installType === 'sand_seal') {
                if (area <= 25) {
                    installLabour = RATES.SAND_SEAL_0_25_LABOUR;
                    installMaterials = RATES.SAND_SEAL_0_25_MATERIALS;
                } else if (area <= 45) {
                    installLabour = RATES.SAND_SEAL_25_45_LABOUR;
                    installMaterials = RATES.SAND_SEAL_25_45_MATERIALS;
                } else {
                    installLabour = areaWithWastage * RATES.SAND_SEAL_45_LABOUR;
                    installMaterials = areaWithWastage * RATES.SAND_SEAL_45_MATERIALS;
                }
            } else if (installType === 'plank_ply') {
                if (area < 5) {
                    installLabour = RATES.PLANK_PLY_UNDER5_LABOUR;
                    installMaterials = RATES.PLANK_PLY_UNDER5_MATERIALS;
                } else {
                    installLabour = areaWithWastage * RATES.PLANK_PLY_LABOUR;
                    installMaterials = areaWithWastage * RATES.PLANK_PLY_MATERIALS;
                }
            } else if (installType === 'install_only') {
                if (area < 20) {
                    installLabour = RATES.INSTALL_UNDER20_LABOUR;
                    installMaterials = RATES.INSTALL_UNDER20_MATERIALS;
                } else {
                    installLabour = areaWithWastage * RATES.INSTALL_LABOUR;
                    installMaterials = areaWithWastage * RATES.INSTALL_MATERIALS;
                }
            }
            
            let removalLabour = 0;
            let removalMaterials = 0;
            let removalAreaValue = 0;
            if (document.getElementById('removal').checked) {
                removalAreaValue = parseFloat(document.getElementById('removalArea').value) || 0;
                if (removalAreaValue > 0) {
                    const removalAreaWithWastage = removalAreaValue * RATES.WASTAGE;
                    if (removalAreaValue < 5) {
                        removalLabour = RATES.REMOVAL_UNDER5_LABOUR;
                        removalMaterials = RATES.REMOVAL_UNDER5_MATERIALS;
                    } else {
                        removalLabour = removalAreaWithWastage * RATES.REMOVAL_LABOUR;
                        removalMaterials = removalAreaWithWastage * RATES.REMOVAL_MATERIALS;
                    }
                }
            }
            
            let beadingMaterial = 0, beadingLabour = 0;
            if (document.getElementById('beading').checked) {
                const length = parseFloat(document.getElementById('beadingLength').value) || 0;
                if (length > 0) {
                    beadingMaterial = length * RATES.BEADING_MATERIAL;
                    beadingLabour = length * RATES.BEADING_LABOUR;
                }
            }
            
            let skirtingMaterial = 0, skirtingLabour = 0, skirtingDelivery = 0;
            if (document.getElementById('skirting').checked) {
                const length = parseFloat(document.getElementById('skirtingLength').value) || 0;
                if (length > 0) {
                    const isLarge = document.getElementById('largeSkirting').checked;
                    skirtingMaterial = length * (isLarge ? RATES.SKIRTING_LARGE_MATERIAL : RATES.SKIRTING_STD_MATERIAL);
                    skirtingLabour = length * (isLarge ? RATES.SKIRTING_LARGE_LABOUR : RATES.SKIRTING_STD_LABOUR);
                    skirtingDelivery = isLarge ? RATES.SKIRTING_LARGE_DELIVERY : RATES.SKIRTING_STD_DELIVERY;
                }
            }
            
            const subtotal = flooringCost + installLabour + installMaterials + removalLabour + removalMaterials +
                           beadingMaterial + beadingLabour + skirtingMaterial + skirtingLabour + skirtingDelivery;
            const gst = subtotal * 0.1;
            const total = subtotal + gst;
            
            currentQuote = {
                jobType: 'replace_install',
                timber, size, grade, area, areaWithWastage, installType, materialCost,
                flooringCost, installLabour, installMaterials, removalLabour, removalMaterials, removalAreaValue,
                beadingMaterial, beadingLabour, skirtingMaterial, skirtingLabour, skirtingDelivery,
                subtotal, gst, total
            };
            
            displayQuote();
        }

        function displayQuote() {
            const q = currentQuote;
            
            let html = '';
            
            if (q.jobType === 'sand_seal_only') {
                html = `
                    <div class="quote-row"><span class="quote-label">Job Type:</span><span class="quote-value">Sand & Seal Only</span></div>
                    <div class="quote-row"><span class="quote-label">Area:</span><span class="quote-value">${q.area} m²</span></div>
                    
                    <div class="section-title">Sand & Seal</div>
                    <div class="quote-row"><span class="quote-label">Labour:</span><span class="quote-value">$${q.installLabour.toFixed(2)}</span></div>
                    <div class="quote-row"><span class="quote-label">Materials:</span><span class="quote-value">$${q.installMaterials.toFixed(2)}</span></div>
                `;
            } else {
                const installTypeNames = {
                    'sand_seal': 'Sand & Seal',
                    'plank_ply': 'Plank on Ply',
                    'install_only': 'Install Only'
                };
                
                html = `
                    <div class="quote-row"><span class="quote-label">Job Type:</span><span class="quote-value">Replace & Install</span></div>
                    <div class="quote-row"><span class="quote-label">Product:</span><span class="quote-value">${q.timber} ${q.size} (${q.grade})</span></div>
                    <div class="quote-row"><span class="quote-label">Area with Wastage:</span><span class="quote-value">${q.areaWithWastage.toFixed(2)} m²</span></div>
                    <div class="quote-row"><span class="quote-label">Installation Type:</span><span class="quote-value">${installTypeNames[q.installType]}</span></div>
                    
                    <div class="section-title">Flooring Materials</div>
                    <div class="quote-row"><span class="quote-label">Timber:</span><span class="quote-value">$${q.flooringCost.toFixed(2)}</span></div>
                    
                    <div class="section-title">Installation</div>
                    <div class="quote-row"><span class="quote-label">Labour:</span><span class="quote-value">$${q.installLabour.toFixed(2)}</span></div>
                    <div class="quote-row"><span class="quote-label">Materials:</span><span class="quote-value">$${q.installMaterials.toFixed(2)}</span></div>
                `;
                
                if (q.removalLabour + q.removalMaterials > 0) {
                    html += `
                        <div class="section-title">Floor Removal (${q.removalAreaValue} m²)</div>
                        <div class="quote-row"><span class="quote-label">Labour:</span><span class="quote-value">$${q.removalLabour.toFixed(2)}</span></div>
                        <div class="quote-row"><span class="quote-label">Materials:</span><span class="quote-value">$${q.removalMaterials.toFixed(2)}</span></div>
                    `;
                    if (q.removalAreaValue < 5) {
                        html += `<div class="notice">*Minimum removal charge applied for jobs under 5m²</div>`;
                    }
                }
                
                if (q.beadingMaterial + q.beadingLabour > 0) {
                    html += `
                        <div class="section-title">Beading</div>
                        <div class="quote-row"><span class="quote-label">Materials:</span><span class="quote-value">$${q.beadingMaterial.toFixed(2)}</span></div>
                        <div class="quote-row"><span class="quote-label">Labour:</span><span class="quote-value">$${q.beadingLabour.toFixed(2)}</span></div>
                    `;
                }
                
                if (q.skirtingMaterial + q.skirtingLabour + q.skirtingDelivery > 0) {
                    html += `
                        <div class="section-title">Skirtings</div>
                        <div class="quote-row"><span class="quote-label">Materials:</span><span class="quote-value">$${q.skirtingMaterial.toFixed(2)}</span></div>
                        <div class="quote-row"><span class="quote-label">Labour:</span><span class="quote-value">$${q.skirtingLabour.toFixed(2)}</span></div>
                        <div class="quote-row"><span class="quote-label">Delivery:</span><span class="quote-value">$${q.skirtingDelivery.toFixed(2)}</span></div>
                    `;
                }
            }
            
            html += `
                <div class="quote-row total-row"><span>Subtotal:</span><span>$${q.subtotal.toFixed(2)}</span></div>
                <div class="quote-row"><span class="quote-label">GST (10%):</span><span class="quote-value">$${q.gst.toFixed(2)}</span></div>
                <div class="quote-row total-row"><span>Total (inc. GST):</span><span>$${q.total.toFixed(2)}</span></div>
            `;
            
            document.getElementById('quoteDetails').innerHTML = html;
            hide('quotePlaceholder');
            show('quoteResult');
        }

        function downloadQuote() {
            if (!currentQuote) return;
            const q = currentQuote;
            
            let text = `STEPFAST FLOORING - SOLID TIMBER QUOTE\n========================================\n\n`;
            text += `Date: ${new Date().toLocaleDateString()}\n`;
            
            if (q.jobType === 'sand_seal_only') {
                text += `Job Type: Sand & Seal Only\n`;
                text += `Area: ${q.area} m²\n\n`;
                text += `SAND & SEAL:\n`;
                text += `Labour: $${q.installLabour.toFixed(2)}\n`;
                text += `Materials: $${q.installMaterials.toFixed(2)}\n\n`;
            } else {
                const installTypeNames = {
                    'sand_seal': 'Sand & Seal',
                    'plank_ply': 'Plank on Ply',
                    'install_only': 'Install Only'
                };
                
                text += `Job Type: Replace & Install\n`;
                text += `Product: ${q.timber} ${q.size} (${q.grade})\n`;
                text += `Area: ${q.area} m² (${q.areaWithWastage.toFixed(2)} m² with wastage)\n`;
                text += `Installation: ${installTypeNames[q.installType]}\n\n`;
                text += `FLOORING MATERIALS:\n`;
                text += `Timber: $${q.flooringCost.toFixed(2)}\n\n`;
                text += `INSTALLATION:\n`;
                text += `Labour: $${q.installLabour.toFixed(2)}\n`;
                text += `Materials: $${q.installMaterials.toFixed(2)}\n\n`;
                
                if (q.removalLabour + q.removalMaterials > 0) {
                    text += `FLOOR REMOVAL (${q.removalAreaValue} m²):\n`;
                    text += `Labour: $${q.removalLabour.toFixed(2)}\n`;
                    text += `Materials: $${q.removalMaterials.toFixed(2)}\n\n`;
                }
                
                if (q.beadingMaterial + q.beadingLabour > 0) {
                    text += `BEADING:\n`;
                    text += `Materials: $${q.beadingMaterial.toFixed(2)}\n`;
                    text += `Labour: $${q.beadingLabour.toFixed(2)}\n\n`;
                }
                
                if (q.skirtingMaterial + q.skirtingLabour + q.skirtingDelivery > 0) {
                    text += `SKIRTINGS:\n`;
                    text += `Materials: $${q.skirtingMaterial.toFixed(2)}\n`;
                    text += `Labour: $${q.skirtingLabour.toFixed(2)}\n`;
                    text += `Delivery: $${q.skirtingDelivery.toFixed(2)}\n\n`;
                }
            }
            
            text += `Subtotal: $${q.subtotal.toFixed(2)}\n`;
            text += `GST (10%): $${q.gst.toFixed(2)}\n`;
            text += `TOTAL: $${q.total.toFixed(2)}\n\n`;
            text += `Stepfast Flooring | (08) 9302 1821`;
            
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Stepfast_SolidTimber_Quote_${new Date().toISOString().split('T')[0]}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // Initialize
        populateTimbers();
        document.getElementById('jobTypeLabel1').classList.add('selected');
        document.getElementById('installLabel1').classList.add('selected');
    </script>
</body>
</html>
